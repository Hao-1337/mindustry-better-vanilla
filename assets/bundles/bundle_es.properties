block.hao1337-mod-box.name = Caja
block.hao1337-mod-box.description = Almacena una pequeña cantidad de cada tipo de objeto. Expande la capacidad al colocarse junto al Núcleo. Los objetos se pueden extraer con un descargador.
block.hao1337-mod-silo.name = Silo
block.hao1337-mod-silo.description = Almacena una cantidad inmensa de todos los tipos de objetos. Expande la capacidad al colocarse junto al Núcleo. Los objetos se pueden extraer con un descargador.
block.hao1337-mod-no-connect-container.name = Puerta del Núcleo
block.hao1337-mod-no-connect-container.description = Transmite recursos instantáneamente desde y hacia el Núcleo a cualquier distancia. Requiere mucha energía. No expande la capacidad del Núcleo.
block.hao1337-mod-ultra-vault.name = Almacén
block.hao1337-mod-ultra-vault.description = Almacena una gran cantidad de cada tipo de objeto. Expande la capacidad al colocarse junto al Núcleo. Los objetos se pueden extraer con un descargador.
block.hao1337-mod-valve-unloader.name = Descargador de Válvula
block.hao1337-mod-valve-unloader.description = Descarga objetos rápidamente de los contenedores.
block.hao1337-mod-dropper.name = Lanzador
block.hao1337-mod-dropper.description = Torreta que se especializa en titanio. Su gran alcance le permite defenderse de objetivos terrestres y aéreos.
block.hao1337-mod-gigantic-dome.name = Emisor de Sobrecarga
block.hao1337-mod-gigantic-dome.description = Aumenta significativamente la velocidad de los edificios en un área extensa. Requiere mucho Phase Fabric y Silicon para funcionar.
block.hao1337-mod-leviathan-reconstructor.name = Reconstructor Leviatán
block.hao1337-mod-leviathan-reconstructor.description = Mejora unidades convirtiéndolas en monstruos mecánicos semidioses.... que tus enemigos sufran.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Torreta escopeta grande y potente. Dispara múltiples proyectiles en arco.
block.hao1337-mod-rbmk-reactor-controller.name = Proyector de Construcción RBMK
block.hao1337-mod-rbmk-reactor-controller.description = ¡Así es como puedes construir un reactor nuclear en casa!
block.hao1337-mod-uranium-centrifuge.name = Centrífuga de Uranio
block.hao1337-mod-uranium-centrifuge.description = Extrae uranio-235 de materia fisible. ¡Puedes necesitar varias en serie para lograrlo!
block.hao1337-mod-armored-surge-conveyor.name = Cinta Transportadora de Aleación Blindada
block.hao1337-mod-armored-surge-conveyor.description = Cinta ultrarrápida que transporta recursos a velocidades extremas. La más rápida disponible, superando incluso a las de torio. No acepta entradas laterales.
block.hao1337-mod-armored-thorium-conveyor.name = Cinta Transportadora de Torio Blindada
block.hao1337-mod-armored-thorium-conveyor.description = Cinta de alta velocidad capaz de transportar muchos objetos. Más rápida que la de titanio. No acepta entradas laterales.
block.hao1337-mod-serpulo-surge-conveyor.name = Cinta Transportadora de Aleación
block.hao1337-mod-serpulo-surge-conveyor.description = Cinta ultrarrápida que transporta recursos a velocidades extremas. La más rápida disponible, superando incluso a las de torio.
block.hao1337-mod-thorium-conveyor.name = Cinta Transportadora de Torio
block.hao1337-mod-thorium-conveyor.description = Cinta de alta velocidad capaz de transportar muchos objetos. Más rápida que la de titanio.

item.hao1337-mod-uranium.name = "Uranio-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Unidad de artillería pesada. Equipada con cuatro cañones, cuatro ametralladoras pesadas y lanzamisiles. Dispara un orbe de energía devastador que causa daño masivo al impactar y potencia a los aliados cercanos.
unit.hao1337-mod-zelvorak.details = Domina los cielos y destruye la tierra.

