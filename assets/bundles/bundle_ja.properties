block.hao1337-mod-box.name = ボックス
block.hao1337-mod-box.description = 各種アイテムを少量保管します。コアの隣に配置すると容量が拡張されます。アンローダーでアイテムを取り出すことができます。
block.hao1337-mod-silo.name = サイロ
block.hao1337-mod-silo.description = すべての種類のアイテムを大量に保管します。コアの隣に配置すると容量が拡張されます。アンローダーでアイテムを取り出すことができます。
block.hao1337-mod-no-connect-container.name = コアゲート
block.hao1337-mod-no-connect-container.description = 距離に関係なく、コアとの間でリソースを瞬時に転送します。動作には大量の電力が必要です。コアの容量は拡張されません。
block.hao1337-mod-ultra-vault.name = 倉庫
block.hao1337-mod-ultra-vault.description = 各種アイテムを大容量で保管します。コアの隣に配置すると容量が拡張されます。アンローダーでアイテムを取り出すことができます。
block.hao1337-mod-valve-unloader.name = バルブアンローダー
block.hao1337-mod-valve-unloader.description = コンテナからアイテムを素早く降ろします。
block.hao1337-mod-dropper.name = ドロッパー
block.hao1337-mod-dropper.description = チタン専用のタレット。射程が長く、対空・対地の両方を防衛できます。
block.hao1337-mod-gigantic-dome.name = オーバードライブエミッター
block.hao1337-mod-gigantic-dome.description = 広範囲の建物の動作速度を大幅に向上させます。動作には大量のフェーズファブリックとシリコンが必要です。
block.hao1337-mod-leviathan-reconstructor.name = リヴァイアサン再構築機
block.hao1337-mod-leviathan-reconstructor.description = ユニットを半神級の機械の怪物にアップグレードします……敵に苦痛を与えましょう。
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = 大型で強力なショットガンタレット。複数の発射体を扇状に発射します。
block.hao1337-mod-rbmk-reactor-controller.name = RBMK 建設プロジェクター
block.hao1337-mod-rbmk-reactor-controller.description = 自宅で原子炉を作る方法がここにあります！
block.hao1337-mod-uranium-centrifuge.name = ウラン遠心分離機
block.hao1337-mod-uranium-centrifuge.description = 核分裂性物質からウラン235を抽出します。これを実現するには、複数を直列に繋ぐ必要があるかもしれません！
block.hao1337-mod-armored-surge-conveyor.name = 装甲サージコンベア
block.hao1337-mod-armored-surge-conveyor.description = 資源を極めて高速で輸送する超高速コンベア。トリウムコンベアを凌ぐ、現在最速のコンベアです。側面からの入力は受け付けません。
block.hao1337-mod-armored-thorium-conveyor.name = 装甲トリウムコンベア
block.hao1337-mod-armored-thorium-conveyor.description = 大量のアイテムを輸送できる高速コンベア。チタンコンベアより高速です。側面からの入力は受け付けません。
block.hao1337-mod-serpulo-surge-conveyor.name = サージコンベア
block.hao1337-mod-serpulo-surge-conveyor.description = 資源を極めて高速で輸送する超高速コンベア。トリウムコンベアを凌ぐ、現在最速のコンベアです。
block.hao1337-mod-thorium-conveyor.name = トリウムコンベア
block.hao1337-mod-thorium-conveyor.description = 大量のアイテムを輸送できる高速コンベア。チタンコンベアより高速です。

item.hao1337-mod-uranium.name = "ウラン235"

unit.hao1337-mod-zelvorak.name = ゼルヴォラク
unit.hao1337-mod-zelvorak.description = [orange]重砲手ユニット。4門の砲、4門の重機関銃、およびミサイルランチャーを装備。着弾時に甚大なダメージを与え、周囲の味方を強化する破壊的なエネルギーオーブを発射します。
unit.hao1337-mod-zelvorak.details = 空を支配し、大地を破壊せよ。

