block.hao1337-mod-box.name = Hộp
block.hao1337-mod-box.description = Chứa một lượng nhỏ mỗi loại vật phẩm. Mở rộng sức chứa khi đặt cạnh Lõi. Có thể lấy vật phẩm ra bằng Bộ dỡ hàng.
block.hao1337-mod-silo.name = Silô
block.hao1337-mod-silo.description = Chứa số lượng khổng lồ mọi loại vật phẩm. Mở rộng sức chứa khi đặt cạnh Lõi. Có thể lấy vật phẩm ra bằng Bộ dỡ hàng.
block.hao1337-mod-no-connect-container.name = Cổng Lõi
block.hao1337-mod-no-connect-container.description = Truyền ngay lập tức tài nguyên đến và đi từ Lõi qua những khoảng cách bất kỳ. Cần lượng lớn điện năng để hoạt động. Không mở rộng Sức chứa Lõi.
block.hao1337-mod-ultra-vault.name = Nhà kho
block.hao1337-mod-ultra-vault.description = Chứa một lượng lớn mỗi loại vật phẩm. Mở rộng sức chứa khi đặt cạnh Lõi. Có thể lấy vật phẩm ra bằng Bộ dỡ hàng.
block.hao1337-mod-valve-unloader.name = Bộ dỡ hàng Van
block.hao1337-mod-valve-unloader.description = Nhanh chóng dỡ vật phẩm từ các kho chứa.
block.hao1337-mod-dropper.name = Dropper
block.hao1337-mod-dropper.description = Một tháp pháo chuyên sử dụng titanium. Tầm bắn xa có thể phòng thủ cả trên không và mặt đất.
block.hao1337-mod-gigantic-dome.name = Máy tăng tốc khổng lồ.
block.hao1337-mod-gigantic-dome.description = Tăng đáng kể tốc độ của các công trình trong một khu vực rộng lớn. Yêu cầu lượng lớn Phase Fabric và Silicon để hoạt động.
block.hao1337-mod-leviathan-reconstructor.name = Máy tái tạo Leviathan
block.hao1337-mod-leviathan-reconstructor.description = Nâng cấp các đơn vị thành những quái vật cơ khí bán thần.... cầu mong kẻ thù của bạn phải chịu đựng.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Tháp pháo shotgun lớn và mạnh mẽ. Bắn nhiều loạt đạn theo hình vòng cung.
block.hao1337-mod-rbmk-reactor-controller.name = Máy chiếu xây dựng RBMK
block.hao1337-mod-rbmk-reactor-controller.description = Đây là cách bạn có thể xây dựng một lò phản ứng hạt nhân ở nhà!
block.hao1337-mod-uranium-centrifuge.name = Máy ly tâm Uranium
block.hao1337-mod-uranium-centrifuge.description = Máy ly tâm có thể chiết xuất uranium-235 từ vật liệu phân hạch. Bạn có thể cần nhiều máy nối tiếp nhau để làm điều đó!
block.hao1337-mod-armored-surge-conveyor.name = Băng chuyền Surge Bọc thép
block.hao1337-mod-armored-surge-conveyor.description = Băng chuyền siêu tốc độ vận chuyển tài nguyên cực nhanh. Băng chuyền nhanh nhất hiện có, vượt qua cả băng chuyền Thorium về tốc độ. Không nhận đầu vào từ các cạnh.
block.hao1337-mod-armored-thorium-conveyor.name = Băng chuyền Thorium Bọc thép
block.hao1337-mod-armored-thorium-conveyor.description = Băng chuyền tốc độ cao có khả năng vận chuyển số lượng lớn vật phẩm. Nhanh hơn băng chuyền titanium. Không nhận đầu vào từ các cạnh.
block.hao1337-mod-serpulo-surge-conveyor.name = Băng chuyền Surge
block.hao1337-mod-serpulo-surge-conveyor.description = Băng chuyền siêu tốc độ vận chuyển tài nguyên cực nhanh. Băng chuyền nhanh nhất hiện có, vượt qua cả băng chuyền Thorium về tốc độ.
block.hao1337-mod-thorium-conveyor.name = Băng chuyền Thorium
block.hao1337-mod-thorium-conveyor.description = Băng chuyền tốc độ cao có khả năng vận chuyển số lượng lớn vật phẩm. Nhanh hơn băng chuyền titanium.

item.hao1337-mod-uranium.name = "Uranium-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Đơn vị xạ thủ hạng nặng. Được trang bị bốn súng thường, bốn súng máy hạng nặng và bệ phóng tên lửa. Có thể bắn quả cầu năng lượng hủy diệt gây sát thương lớn khi va chạm và tăng sức mạnh cho đồng minh xung quanh.
unit.hao1337-mod-zelvorak.details = Thống trị bầu trời và tiêu diệt mặt đất.

