block.hao1337-mod-box.name = 상자
block.hao1337-mod-box.description = 각 아이템을 소량 저장합니다. 코어 옆에 배치하면 용량이 확장됩니다. 언로더로 내용물을 꺼낼 수 있습니다.
block.hao1337-mod-silo.name = 격납고
block.hao1337-mod-silo.description = 모든 아이템을 엄청난 양으로 저장합니다. 코어 옆에 배치하면 용량이 확장됩니다. 언로더로 내용물을 꺼낼 수 있습니다.
block.hao1337-mod-no-connect-container.name = 코어 게이트
block.hao1337-mod-no-connect-container.description = 거리에 관계없이 코어와 자원을 즉시 송수신합니다. 작동하려면 대량의 전력이 필요합니다. 코어 용량을 확장하지 않습니다.
block.hao1337-mod-ultra-vault.name = 창고
block.hao1337-mod-ultra-vault.description = 각 아이템을 대량으로 저장합니다. 코어 옆에 배치하면 용량이 확장됩니다. 언로더로 내용물을 꺼낼 수 있습니다.
block.hao1337-mod-valve-unloader.name = 밸브 언로더
block.hao1337-mod-valve-unloader.description = 저장소에서 아이템을 빠르게 내립니다.
block.hao1337-mod-dropper.name = 드로퍼
block.hao1337-mod-dropper.description = 티타늄을 전문으로 사용하는 포탑입니다. 사거리가 길어 공중과 지상 모두 방어할 수 있습니다.
block.hao1337-mod-gigantic-dome.name = 오버드라이브 이미터
block.hao1337-mod-gigantic-dome.description = 넓은 지역에 있는 건물의 속도를 크게 높입니다. 작동하려면 다량의 Phase Fabric 및 Silicon이 필요합니다.
block.hao1337-mod-leviathan-reconstructor.name = 레비아탄 재구성기
block.hao1337-mod-leviathan-reconstructor.description = 유닛을 반신급 기계 괴물로 업그레이드합니다.... 적들에게 고통을 선사하십시오.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = 거대하고 강력한 샷건 포탑입니다. 부채꼴 모양으로 여러 발의 발사체를 쏩니다.
block.hao1337-mod-rbmk-reactor-controller.name = RBMK 건설 프로젝터
block.hao1337-mod-rbmk-reactor-controller.description = 집에서 원자로를 건설하는 방법이 여기에 있습니다!
block.hao1337-mod-uranium-centrifuge.name = 우라늄 원심분리기
block.hao1337-mod-uranium-centrifuge.description = 핵분열 물질에서 우라늄-235를 추출할 수 있는 원심분리기입니다. 이를 위해 여러 대를 직렬로 연결해야 할 수도 있습니다!
block.hao1337-mod-armored-surge-conveyor.name = 장갑 서지 컨베이어
block.hao1337-mod-armored-surge-conveyor.description = 자원을 극도로 빠르게 운송하는 초고속 컨베이어입니다. 토륨 컨베이어를 뛰어넘는 현재 가장 빠른 컨베이어입니다. 측면 입력을 받지 않습니다.
block.hao1337-mod-armored-thorium-conveyor.name = 장갑 토륨 컨베이어
block.hao1337-mod-armored-thorium-conveyor.description = 많은 양의 아이템을 운송할 수 있는 고속 컨베이어입니다. 티타늄 컨베이어보다 빠릅니다. 측면 입력을 받지 않습니다.
block.hao1337-mod-serpulo-surge-conveyor.name = 서지 컨베이어
block.hao1337-mod-serpulo-surge-conveyor.description = 자원을 극도로 빠르게 운송하는 초고속 컨베이어입니다. 토륨 컨베이어를 뛰어넘는 현재 가장 빠른 컨베이어입니다.
block.hao1337-mod-thorium-conveyor.name = 토륨 컨베이어
block.hao1337-mod-thorium-conveyor.description = 많은 양의 아이템을 운송할 수 있는 고속 컨베이어입니다. 티타늄 컨베이어보다 빠릅니다.

item.hao1337-mod-uranium.name = "우라늄-235"

unit.hao1337-mod-zelvorak.name = 젤보락
unit.hao1337-mod-zelvorak.description = [orange]중화기 유닛입니다. 4문의 포, 4문의 중기관총, 미사일 런처를 장착했습니다. 충돌 시 막대한 피해를 입히고 주변 아군을 강화하는 파괴적인 에너지 구체를 발사합니다.
unit.hao1337-mod-zelvorak.details = 하늘을 지배하고 대지를 파괴하십시오.

