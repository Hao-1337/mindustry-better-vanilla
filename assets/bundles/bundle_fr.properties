block.hao1337-mod-box.name = Boîte
block.hao1337-mod-box.description = Stocke une petite quantité de chaque type d'objet. Augmente la capacité de stockage lorsqu'elle est placée à côté d'un Noyau. Les objets peuvent être retirés avec un déchargeur.
block.hao1337-mod-silo.name = Silo
block.hao1337-mod-silo.description = Stocke une quantité énorme de tous les types d'objets. Augmente la capacité de stockage lorsqu'il est placé à côté d'un Noyau. Les objets peuvent être retirés avec un déchargeur.
block.hao1337-mod-no-connect-container.name = Porte du Noyau
block.hao1337-mod-no-connect-container.description = Transmet instantanément des ressources vers et depuis le Noyau, quelle que soit la distance. Nécessite une grande quantité d'énergie pour fonctionner. N'augmente pas la capacité du Noyau.
block.hao1337-mod-ultra-vault.name = Entrepôt
block.hao1337-mod-ultra-vault.description = Stocke une grande quantité de chaque type d'objet. Augmente la capacité de stockage lorsqu'il est placé à côté d'un Noyau. Les objets peuvent être retirés avec un déchargeur.
block.hao1337-mod-valve-unloader.name = Déchargeur à Valve
block.hao1337-mod-valve-unloader.description = Décharge rapidement les objets des stockages.
block.hao1337-mod-dropper.name = Lanceur
block.hao1337-mod-dropper.description = Une tourelle spécialisée dans l'utilisation du titane. Sa grande portée lui permet de défendre contre les cibles aériennes et terrestres.
block.hao1337-mod-gigantic-dome.name = Émetteur de surcadençage
block.hao1337-mod-gigantic-dome.description = Augmente considérablement la vitesse des bâtiments sur une vaste zone. Nécessite une grande quantité de tissu phasé et de silicium pour fonctionner.
block.hao1337-mod-leviathan-reconstructor.name = Reconstructeur Léviathan
block.hao1337-mod-leviathan-reconstructor.description = Améliore les unités en monstres mécaniques demi-dieux.... que vos ennemis souffrent.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Tourelle à pompe grande et puissante. Tire plusieurs projectiles en arc de cercle.
block.hao1337-mod-rbmk-reactor-controller.name = Projecteur de Construction RBMK
block.hao1337-mod-rbmk-reactor-controller.description = Voici comment construire un réacteur nucléaire à la maison !
block.hao1337-mod-uranium-centrifuge.name = Centrifugeuse d'Uranium
block.hao1337-mod-uranium-centrifuge.description = Extrait l'uranium-235 de la matière fissile. Vous aurez peut-être besoin de plusieurs centrifugeuses à la suite pour y parvenir !
block.hao1337-mod-armored-surge-conveyor.name = Convoyeur d'alliage blindé
block.hao1337-mod-armored-surge-conveyor.description = Convoyeur ultra-rapide qui transporte les ressources à une vitesse extrême. Le plus rapide disponible, dépassant même les convoyeurs au thorium. N'accepte pas les entrées latérales.
block.hao1337-mod-armored-thorium-conveyor.name = Convoyeur au thorium blindé
block.hao1337-mod-armored-thorium-conveyor.description = Convoyeur à grande vitesse capable de transporter un grand nombre d'objets. Plus rapide que les convoyeurs au titane. N'accepte pas les entrées latérales.
block.hao1337-mod-serpulo-surge-conveyor.name = Convoyeur d'alliage
block.hao1337-mod-serpulo-surge-conveyor.description = Convoyeur ultra-rapide qui transporte les ressources à une vitesse extrême. Le plus rapide disponible, dépassant même les convoyeurs au thorium.
block.hao1337-mod-thorium-conveyor.name = Convoyeur au thorium
block.hao1337-mod-thorium-conveyor.description = Convoyeur à grande vitesse capable de transporter un grand nombre d'objets. Plus rapide que les convoyeurs en titane.

item.hao1337-mod-uranium.name = "Uranium-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Unité de tireur lourd. Équipée de quatre canons, de quatre mitrailleuses lourdes et de lance-missiles. Tire un orbe d'énergie dévastateur qui inflige d'énormes dégâts à l'impact et renforce les alliés à proximité.
unit.hao1337-mod-zelvorak.details = Dominez les cieux et ravagez la terre.

