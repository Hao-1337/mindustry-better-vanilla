block.hao1337-mod-box.name = Scatola
block.hao1337-mod-box.description = Conserva una piccola quantità di ogni tipo di oggetto. Espande la capacità se posizionata accanto al Nucleo. Gli oggetti possono essere recuperati con uno scaricatore.
block.hao1337-mod-silo.name = Silos
block.hao1337-mod-silo.description = Conserva una quantità massiccia di tutti i tipi di oggetti. Espande la capacità se posizionato accanto al Nucleo. Gli oggetti possono essere recuperati con uno scaricatore.
block.hao1337-mod-no-connect-container.name = Portale del Nucleo
block.hao1337-mod-no-connect-container.description = Trasmette risorse istantaneamente da e verso il Nucleo a qualsiasi distanza. Richiede una grande quantità di energia. Non espande la capacità del Nucleo.
block.hao1337-mod-ultra-vault.name = Magazzino
block.hao1337-mod-ultra-vault.description = Conserva una grande quantità di ogni tipo di oggetto. Espande la capacità se posizionato accanto al Nucleo. Gli oggetti possono essere recuperati con uno scaricatore.
block.hao1337-mod-valve-unloader.name = Scaricatore a Valvola
block.hao1337-mod-valve-unloader.description = Scarica rapidamente gli oggetti dai contenitori.
block.hao1337-mod-dropper.name = Lanciatore
block.hao1337-mod-dropper.description = Una torretta specializzata nell'uso del titanio. La sua grande gittata permette di difendersi da bersagli aerei e terrestri.
block.hao1337-mod-gigantic-dome.name = Emettitore di Sovraccarico
block.hao1337-mod-gigantic-dome.description = Aumenta significativamente la velocità degli edifici in una vasta area. Richiede molto Phase Fabric e Silicon per funzionare.
block.hao1337-mod-leviathan-reconstructor.name = Ricostruttore Leviatano
block.hao1337-mod-leviathan-reconstructor.description = Migliora le unità in mostri meccanici semidei.... che i tuoi nemici soffrano.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Grande e potente torretta a pompa. Spara multipli proiettili ad arco.
block.hao1337-mod-rbmk-reactor-controller.name = Proiettore di Costruzione RBMK
block.hao1337-mod-rbmk-reactor-controller.description = Ecco come puoi costruire un reattore nucleare in casa!
block.hao1337-mod-uranium-centrifuge.name = Centrifuga per Uranio
block.hao1337-mod-uranium-centrifuge.description = Estrae uranio-235 dalla materia fissile. Potresti aver bisogno di più centrifughe in serie per riuscirci!
block.hao1337-mod-armored-surge-conveyor.name = Nastro Trasportatore in Lega Blindato
block.hao1337-mod-armored-surge-conveyor.description = Nastro ultra-veloce che trasporta risorse a velocità estrema. Il più veloce disponibile, superando persino i nastri in torio. Non accetta input dai lati.
block.hao1337-mod-armored-thorium-conveyor.name = Nastro Trasportatore in Torio Blindato
block.hao1337-mod-armored-thorium-conveyor.description = Nastro ad alta velocità capace di trasportare molti oggetti. Più veloce del nastro in titanio. Non accetta input dai lati.
block.hao1337-mod-serpulo-surge-conveyor.name = Nastro Trasportatore in Lega
block.hao1337-mod-serpulo-surge-conveyor.description = Nastro ultra-veloce che trasporta risorse a velocità estrema. Il più veloce disponibile, superando persino i nastri in torio.
block.hao1337-mod-thorium-conveyor.name = Nastro Trasportatore in Torio
block.hao1337-mod-thorium-conveyor.description = Nastro ad alta velocità capace di trasportare molti oggetti. Più veloce del nastro in titanio.

item.hao1337-mod-uranium.name = "Uranio-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Unità artigliere pesante. Equipaggiata con quattro cannoni, quattro mitragliatrici pesanti e lanciamissili. Spara una sfera di energia devastante che causa danni enormi all'impatto e potenzia gli alleati vicini.
unit.hao1337-mod-zelvorak.details = Domina i cieli e distruggi la terra.

