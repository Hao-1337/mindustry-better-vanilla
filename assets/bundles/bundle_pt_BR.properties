block.hao1337-mod-box.name = Caixa
block.hao1337-mod-box.description = Armazena uma pequena quantidade de cada tipo de item. Expande o armazenamento ao ser colocada perto do Núcleo. Itens podem ser retirados com um descarregador.
block.hao1337-mod-silo.name = Silo
block.hao1337-mod-silo.description = Armazena uma quantidade massiva de todos os tipos de itens. Expande o armazenamento ao ser colocado perto do Núcleo. Itens podem ser retirados com um descarregador.
block.hao1337-mod-no-connect-container.name = Portão do Núcleo
block.hao1337-mod-no-connect-container.description = Transmite recursos instantaneamente de e para o Núcleo a qualquer distância. Requer muita energia para funcionar. Não expande o armazenamento do Núcleo.
block.hao1337-mod-ultra-vault.name = Armazém
block.hao1337-mod-ultra-vault.description = Armazena uma grande quantidade de cada tipo de item. Expande o armazenamento ao ser colocado perto do Núcleo. Itens podem ser retirados com um descarregador.
block.hao1337-mod-valve-unloader.name = Descarregador de Válvula
block.hao1337-mod-valve-unloader.description = Descarrega itens rapidamente de recipientes.
block.hao1337-mod-dropper.name = Lançador
block.hao1337-mod-dropper.description = Uma torre especializada em titânio. Seu longo alcance permite defender tanto no ar quanto no solo.
block.hao1337-mod-gigantic-dome.name = Emissor de Sobrecarga
block.hao1337-mod-gigantic-dome.description = Aumenta significativamente a velocidade das construções em uma área enorme. Requer muito Tecido de Fase e Silício para funcionar.
block.hao1337-mod-leviathan-reconstructor.name = Reconstrutor Leviatã
block.hao1337-mod-leviathan-reconstructor.description = Atualiza unidades para monstros mecânicos semideuses.... que seus inimigos sofram.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Torreta de escopeta grande e poderosa. Dispara vários projéteis em arco.
block.hao1337-mod-rbmk-reactor-controller.name = Projetor de Construção RBMK
block.hao1337-mod-rbmk-reactor-controller.description = É assim que você constrói um reator nuclear em casa!
block.hao1337-mod-uranium-centrifuge.name = Centrífuga de Urânio
block.hao1337-mod-uranium-centrifuge.description = Uma centrífuga capaz de extrair urânio-235 de matéria físsil. Você pode precisar de várias em série para isso!
block.hao1337-mod-armored-surge-conveyor.name = Esteira de Liga Blindada
block.hao1337-mod-armored-surge-conveyor.description = Esteira de altíssima velocidade que transporta recursos de forma extremamente rápida. A mais rápida disponível, superando até as de tório. Não aceita entrada pelos lados.
block.hao1337-mod-armored-thorium-conveyor.name = Esteira de Tório Blindada
block.hao1337-mod-armored-thorium-conveyor.description = Esteira de alta velocidade capaz de transportar um grande número de itens. Mais rápida que as esteiras de titânio. Não aceita entrada pelos lados.
block.hao1337-mod-serpulo-surge-conveyor.name = Esteira de Liga
block.hao1337-mod-serpulo-surge-conveyor.description = Esteira de altíssima velocidade que transporta recursos de forma extremamente rápida. A mais rápida disponível, superando até as de tório.
block.hao1337-mod-thorium-conveyor.name = Esteira de Tório
block.hao1337-mod-thorium-conveyor.description = Esteira de alta velocidade capaz de transportar um grande número de itens. Mais rápida que as esteiras de titânio.

item.hao1337-mod-uranium.name = "Urânio-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Unidade de artilharia pesada. Equipada com quatro canhões, quatro metralhadoras pesadas e lançadores de mísseis. Dispara um orbe de energia devastador que causa dano massivo no impacto e fortalece os aliados próximos.
unit.hao1337-mod-zelvorak.details = Domine os céus e destrua a terra.

