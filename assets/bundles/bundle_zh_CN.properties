block.hao1337-mod-box.name = 盒子
block.hao1337-mod-box.description = 储存少量各类物品。放置在核心旁可扩充容量。可用卸载器提取物品。
block.hao1337-mod-silo.name = 筒仓
block.hao1337-mod-silo.description = 储存海量各类物品。放置在核心旁可扩充容量。可用卸载器提取物品。
block.hao1337-mod-no-connect-container.name = 核心传送门
block.hao1337-mod-no-connect-container.description = 在任意距离间与核心瞬间传输资源。需要消耗大量电力。不扩充核心容量。
block.hao1337-mod-ultra-vault.name = 仓库
block.hao1337-mod-ultra-vault.description = 储存大量各类物品。放置在核心旁可扩充容量。可用卸载器提取物品。
block.hao1337-mod-valve-unloader.name = 阀门卸载器
block.hao1337-mod-valve-unloader.description = 快速从容器中卸载物品。
block.hao1337-mod-dropper.name = 投放器
block.hao1337-mod-dropper.description = 专用的钛弹药炮塔。射程远，可兼顾防空与对地。
block.hao1337-mod-gigantic-dome.name = 超速发射器
block.hao1337-mod-gigantic-dome.description = 大幅提升广阔范围内建筑的运行速度。需要大量相织布和硅才能运作。
block.hao1337-mod-leviathan-reconstructor.name = 利维坦重构机
block.hao1337-mod-leviathan-reconstructor.description = 将单位升级为半神级别的机械巨兽……让你的敌人尽情受苦吧。
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = 大型强力霰弹炮塔。呈弧形发射多发弹丸。
block.hao1337-mod-rbmk-reactor-controller.name = RBMK 建筑投影仪
block.hao1337-mod-rbmk-reactor-controller.description = 让你在家也能建核反应堆！
block.hao1337-mod-uranium-centrifuge.name = 铀离心机
block.hao1337-mod-uranium-centrifuge.description = 从裂变物质中提取铀-235。你可能需要将多个离心机串联起来！
block.hao1337-mod-armored-surge-conveyor.name = 装甲巨浪传送带
block.hao1337-mod-armored-surge-conveyor.description = 极速传输资源的超高速传送带。当前最快的传送带，速度甚至超越钍传送带。不接受侧面输入。
block.hao1337-mod-armored-thorium-conveyor.name = 装甲钍传送带
block.hao1337-mod-armored-thorium-conveyor.description = 能运送大量物品的高速传送带。比钛传送带更快。不接受侧面输入。
block.hao1337-mod-serpulo-surge-conveyor.name = 巨浪传送带
block.hao1337-mod-serpulo-surge-conveyor.description = 极速传输资源的超高速传送带。当前最快的传送带，速度甚至超越钍传送带。
block.hao1337-mod-thorium-conveyor.name = 钍传送带
block.hao1337-mod-thorium-conveyor.description = 能运送大量物品的高速传送带。比钛传送带更快。

item.hao1337-mod-uranium.name = "铀-235"

unit.hao1337-mod-zelvorak.name = 泽尔沃拉克
unit.hao1337-mod-zelvorak.description = [orange]重型射手单位。配备四门火炮、四挺重机枪及导弹发射器。能发射极具破坏力的能量球，碰撞时造成巨大伤害并强化周围盟友。
unit.hao1337-mod-zelvorak.details = 统御苍穹，毁灭大地。

