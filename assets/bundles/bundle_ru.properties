block.hao1337-mod-box.name = Коробка
block.hao1337-mod-box.description = Хранит небольшое количество предметов каждого типа. Увеличивает вместимость при размещении рядом с Ядром. Предметы можно извлечь разгрузчиком.
block.hao1337-mod-silo.name = Силос
block.hao1337-mod-silo.description = Хранит огромное количество всех типов предметов. Увеличивает вместимость при размещении рядом с Ядром. Предметы можно извлечь разгрузчиком.
block.hao1337-mod-no-connect-container.name = Врата Ядра
block.hao1337-mod-no-connect-container.description = Мгновенно передает ресурсы к Ядру и от него на любые расстояния. Требует много энергии. Не увеличивает вместимость Ядра.
block.hao1337-mod-ultra-vault.name = Склад
block.hao1337-mod-ultra-vault.description = Хранит большое количество предметов каждого типа. Увеличивает вместимость при размещении рядом с Ядром. Предметы можно извлечь разгрузчиком.
block.hao1337-mod-valve-unloader.name = Вентильный разгрузчик
block.hao1337-mod-valve-unloader.description = Быстро выгружает предметы из контейнеров.
block.hao1337-mod-dropper.name = Сбрасыватель
block.hao1337-mod-dropper.description = Турель, использующая титан. Большая дальность позволяет поражать наземные и воздушные цели.
block.hao1337-mod-gigantic-dome.name = Излучатель перегрузки
block.hao1337-mod-gigantic-dome.description = Значительно ускоряет работу зданий на большой площади. Требует много фазовой ткани и кремния.
block.hao1337-mod-leviathan-reconstructor.name = Реконструктор Левиафан
block.hao1337-mod-leviathan-reconstructor.description = Улучшает юнитов до механических монстров-полубогов.... пусть враги страдают.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Мощная дробовая турель. Выпускает веер снарядов по дуге.
block.hao1337-mod-rbmk-reactor-controller.name = Строительный проектор РБМК
block.hao1337-mod-rbmk-reactor-controller.description = Вот так можно построить ядерный реактор дома!
block.hao1337-mod-uranium-centrifuge.name = Урановая центрифуга
block.hao1337-mod-uranium-centrifuge.description = Извлекает уран-235 из делящегося вещества. Для этого может потребоваться несколько центрифуг подряд!
block.hao1337-mod-armored-surge-conveyor.name = Бронированный конвейер из кинетического сплава
block.hao1337-mod-armored-surge-conveyor.description = Сверхскоростной конвейер для невероятно быстрой транспортировки. Самый быстрый конвейер, превосходящий даже ториевый. Не принимает ресурсы с боков.
block.hao1337-mod-armored-thorium-conveyor.name = Бронированный ториевый конвейер
block.hao1337-mod-armored-thorium-conveyor.description = Скоростной конвейер с высокой пропускной способностью. Быстрее титанового. Не принимает ресурсы с боков.
block.hao1337-mod-serpulo-surge-conveyor.name = Конвейер из кинетического сплава
block.hao1337-mod-serpulo-surge-conveyor.description = Сверхскоростной конвейер для невероятно быстрой транспортировки. Самый быстрый конвейер, превосходящий даже ториевый.
block.hao1337-mod-thorium-conveyor.name = Ториевый конвейер
block.hao1337-mod-thorium-conveyor.description = Скоростной конвейер с высокой пропускной способностью. Быстрее титанового.

item.hao1337-mod-uranium.name = "Уран-235"

unit.hao1337-mod-zelvorak.name = Зелворак
unit.hao1337-mod-zelvorak.description = [orange]Тяжелый стрелковый юнит. Оснащен 4 пушками, 4 тяжелыми пулеметами и ракетными установками. Выпускает разрушительную сферу, наносящую колоссальный урон и усиливающую союзников.
unit.hao1337-mod-zelvorak.details = Властвуй в небе и уничтожай на земле.

