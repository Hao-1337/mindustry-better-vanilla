block.hao1337-mod-box.name = Kiste
block.hao1337-mod-box.description = Speichert eine kleine Menge jedes Gegenstandstyps. Erweitert die Kapazität, wenn sie neben einem Kern platziert wird. Inhalte können mit einem Entlader entnommen werden.
block.hao1337-mod-silo.name = Silo
block.hao1337-mod-silo.description = Speichert eine riesige Menge aller Gegenstandstypen. Erweitert die Kapazität, wenn es neben einem Kern platziert wird. Inhalte können mit einem Entlader entnommen werden.
block.hao1337-mod-no-connect-container.name = Kerntor
block.hao1337-mod-no-connect-container.description = Überträgt Ressourcen sofort über jede Entfernung zum und vom Kern. Benötigt für den Betrieb eine große Menge an Energie. Erweitert nicht die Kernkapazität.
block.hao1337-mod-ultra-vault.name = Lagerhaus
block.hao1337-mod-ultra-vault.description = Speichert eine große Menge jedes Gegenstandstyps. Erweitert die Kapazität, wenn es neben einem Kern platziert wird. Inhalte können mit einem Entlader entnommen werden.
block.hao1337-mod-valve-unloader.name = Ventil-Entlader
block.hao1337-mod-valve-unloader.description = Entlädt Gegenstände schnell aus Containern.
block.hao1337-mod-dropper.name = Werfer
block.hao1337-mod-dropper.description = Ein Geschützturm, der auf die Verwendung von Titan spezialisiert ist. Seine große Reichweite ermöglicht die Verteidigung gegen Luft- und Bodenziele.
block.hao1337-mod-gigantic-dome.name = Overdrive-Emitter
block.hao1337-mod-gigantic-dome.description = Erhöht die Geschwindigkeit von Gebäuden in einem großen Bereich erheblich. Benötigt viel Phase Fabric und Silicon für den Betrieb.
block.hao1337-mod-leviathan-reconstructor.name = Leviathan-Rekonstruktor
block.hao1337-mod-leviathan-reconstructor.description = Verbessert Einheiten zu halbgottartigen mechanischen Monstern.... mögen deine Feinde leiden.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Großer und mächtiger Schrotflinten-Turm. Feuert mehrere Projektile in einem Bogen ab.
block.hao1337-mod-rbmk-reactor-controller.name = RBMK-Bauprojektor
block.hao1337-mod-rbmk-reactor-controller.description = So kannst du zu Hause einen Kernreaktor bauen!
block.hao1337-mod-uranium-centrifuge.name = Uran-Zentrifuge
block.hao1337-mod-uranium-centrifuge.description = Eine Zentrifuge, die Uran-235 aus spaltbarem Material extrahieren kann. Du benötigst möglicherweise mehrere in einer Reihe, um das zu tun!
block.hao1337-mod-armored-surge-conveyor.name = Gepanzerte Surge-Förderband
block.hao1337-mod-armored-surge-conveyor.description = Ultra-Hochgeschwindigkeits-Förderband, das Ressourcen extrem schnell transportiert. Das schnellste verfügbare Förderband, das sogar Thorium-Förderbänder an Geschwindigkeit übertrifft. Akzeptiert keine Eingaben von den Seiten.
block.hao1337-mod-armored-thorium-conveyor.name = Gepanzerte Thorium-Förderband
block.hao1337-mod-armored-thorium-conveyor.description = Hochgeschwindigkeits-Förderband, das eine große Anzahl von Gegenständen transportieren kann. Schneller als Titan-Förderbänder. Akzeptiert keine Eingaben von den Seiten.
block.hao1337-mod-serpulo-surge-conveyor.name = Surge-Förderband
block.hao1337-mod-serpulo-surge-conveyor.description = Ultra-Hochgeschwindigkeits-Förderband, das Ressourcen extrem schnell transportiert. Das schnellste verfügbare Förderband, das sogar Thorium-Förderbänder an Geschwindigkeit übertrifft.
block.hao1337-mod-thorium-conveyor.name = Thorium-Förderband
block.hao1337-mod-thorium-conveyor.description = Hochgeschwindigkeits-Förderband, das eine große Anzahl von Gegenständen transportieren kann. Schneller als Titan-Förderbänder.

item.hao1337-mod-uranium.name = "Uran-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]Schwere Schützeneinheit. Ausgestattet mit vier Kanonen, vier schweren Maschinengewehren und Raketenwerfern. Feuert eine verheerende Energiekugel ab, die beim Aufprall massiven Schaden verursacht und verbündete Einheiten in der Nähe stärkt.
unit.hao1337-mod-zelvorak.details = Beherrsche den Himmel und zerstöre das Land.

