block.hao1337-mod-box.name = Box
block.hao1337-mod-box.description = Stores a small amount of items of each type. Expands storage when placed next to a core. Contents can be retrieved with an unloader.
block.hao1337-mod-silo.name = Silo
block.hao1337-mod-silo.description = Stores huge amounts of all item types. Expands storage when placed next to a core. Contents can be retrieved with an unloader.
block.hao1337-mod-no-connect-container.name= Core Gate
block.hao1337-mod-no-connect-container.description= Transmits resources to and from the Core over arbitrary distances instantly. Requires large amount of power to operate. Does not expand Core Storage.
block.hao1337-mod-ultra-vault.name = Warehouse
block.hao1337-mod-ultra-vault.description = Stores a massive amount of items of each type. Expands storage when placed next to a core. Contents can be retrieved with an unloader.
block.hao1337-mod-valve-unloader.name = Valve Unloader
block.hao1337-mod-valve-unloader.description = Rapidly unloads items from storages.
block.hao1337-mod-dropper.name = Droper
block.hao1337-mod-dropper.description = A turret specializes in using titanium. Great range can defend both in the air and on the ground
block.hao1337-mod-gigantic-dome.name = Overdrive Emitter
block.hao1337-mod-gigantic-dome.description = Signifigantly increases speed of buildings in a wide area. requires large amounts of Phase Fabric and Silicon to run.
block.hao1337-mod-leviathan-reconstructor.name = Leviathan Recontructor
block.hao1337-mod-leviathan-reconstructor.description = Upgrades units to demi-god mechanical monsters.... may your enemies suffer.
block.hao1337-mod-m1014.name = M1014
block.hao1337-mod-m1014.description = Large and powerful shotgun turret. Fires multiple prjectiles in an arc.
block.hao1337-mod-rbmk-reactor-controller.name = RBMK Build Projector
block.hao1337-mod-rbmk-reactor-controller.description = This is how you can build a nuclear reactor at home!
block.hao1337-mod-uranium-centrifuge.name = Uranium Centrifuge
block.hao1337-mod-uranium-centrifuge.description = A centrifuge can extract uranium-235 from fissile matter. You may need multiple in a row to do that!
block.hao1337-mod-armored-surge-conveyor.name = Armored Surge Conveyor
block.hao1337-mod-armored-surge-conveyor.description = Ultra-high-speed conveyer that transports resouces extremly quickly. Fastest conveyer available exceeding even Thorium conveyers in speed. Does not accept input form the sides.
block.hao1337-mod-armored-thorium-conveyor.name = Armored Thorium Conveyor
block.hao1337-mod-armored-thorium-conveyor.description = High-speed conveyor able to transport a large number of items. Faster than titanium conveyors. Does not accept input form the sides.
block.hao1337-mod-serpulo-surge-conveyor.name = Surge Conveyor
block.hao1337-mod-serpulo-surge-conveyor.description = Ultra-high-speed conveyor that transports resources extremely quickly. Fastest conveyer available exceeding even Thorium conveyers in speed.
block.hao1337-mod-thorium-conveyor.name = Thorium Conveyor
block.hao1337-mod-thorium-conveyor.description = High-speed conveyor able to transport a large number of items. Faster than titanium conveyors.

item.hao1337-mod-uranium.name = "Uranium-235"

unit.hao1337-mod-zelvorak.name = Zelvorak
unit.hao1337-mod-zelvorak.description = [orange]The heavy gunner class titan unit. Equipped four gunners and four heavy gunners and it is equipped with missike launchers. Can fire devastating energy orb that deals massive damage on impact empowers nearby allies.
unit.hao1337-mod-zelvorak.details = Rule the skies and destroy the land.

